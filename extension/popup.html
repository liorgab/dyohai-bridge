<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
  <meta charset="UTF-8" />
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, 'Segoe UI', Arial, sans-serif;
      width: 300px;
      padding: 16px;
      margin: 0;
      background: #fafafa;
    }
    h1 {
      font-size: 15px;
      margin: 0 0 14px;
      color: #1a1a1a;
      padding-bottom: 8px;
      border-bottom: 2px solid #1a73e8;
    }
    .service {
      background: white;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 10px;
      border: 1px solid #e5e7eb;
    }
    .service h2 {
      font-size: 13px;
      margin: 0 0 8px;
      color: #374151;
      font-weight: 600;
    }
    .status {
      font-size: 12px;
      padding: 6px 10px;
      border-radius: 6px;
      margin-bottom: 8px;
    }
    .status.ok { background: #dcfce7; color: #166534; }
    .status.warn { background: #fef3c7; color: #92400e; }
    .status.error { background: #fee2e2; color: #991b1b; }
    .status .small { display: block; margin-top: 3px; font-size: 10px; opacity: 0.8; }
    button {
      width: 100%;
      padding: 8px;
      border: none;
      border-radius: 6px;
      background: #1a73e8;
      color: white;
      font-size: 12px;
      cursor: pointer;
      font-weight: 500;
    }
    button:hover { background: #1557b0; }
    button.secondary { background: #6b7280; }
    button.secondary:hover { background: #4b5563; }
    button.whatsapp { background: #25d366; }
    button.whatsapp:hover { background: #1ebb5a; }
    button.bulk { background: #16a34a; }
    button.bulk:hover { background: #15803d; }
    button:disabled { background: #9ca3af !important; cursor: not-allowed; opacity: 0.7; }
    .footer {
      font-size: 10px;
      color: #9ca3af;
      text-align: center;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <h1>D.Yohai Bridge</h1>

  <div class="service">
    <h2>🛂 PIBA (רשות האוכלוסין)</h2>
    <div id="pibaStatus" class="status">טוען...</div>
    <button id="openPiba">פתח את PIBA</button>
  </div>

  <div class="service">
    <h2>🚌 HopOn</h2>
    <div id="hoponStatus" class="status">טוען...</div>
    <button id="openHopOn" class="secondary">פתח את HopOn</button>
  </div>

  <div class="service">
    <h2>💬 WhatsApp (שליחה יחידה)</h2>
    <div id="waStatus" class="status">טוען...</div>
    <button id="openWhatsApp" class="whatsapp">פתח את WhatsApp Web</button>
  </div>

  <div class="service">
    <h2>📤 Bulk Sender (סידור / שליחה המונית)</h2>
    <div id="bulkStatus" class="status">טוען...</div>
    <button id="openBulkWA" class="bulk">פתח Chrome Test לסריקת QR</button>
  </div>

  <div class="footer">v1.4.0 · D.Yohai Integration</div>

  <script src="popup.js"></script>
</body>
</html>
